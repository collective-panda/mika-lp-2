<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特定商取引法に基づく表記</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Noto Sans JP', sans-serif; background-color: #fafafa; }</style>
</head>
<body class="py-20 px-4 text-gray-800">
    <div class="max-w-3xl mx-auto bg-white p-10 rounded-2xl shadow-lg border border-gray-200">
        <h1 class="text-3xl font-black text-center mb-10 border-b-2 border-pink-200 pb-4">特定商取引法に基づく表記</h1>
        
        <table class="w-full text-left border-collapse">
            <tbody>
                <tr class="border-b border-gray-100">
                    <th class="py-4 font-bold w-1/3 text-gray-600 bg-gray-50 px-4">販売事業者</th>
                    <td class="py-4 px-4">合同会社（ダミー）</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="py-4 font-bold w-1/3 text-gray-600 bg-gray-50 px-4">運営責任者</th>
                    <td class="py-4 px-4">美香</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="py-4 font-bold w-1/3 text-gray-600 bg-gray-50 px-4">所在地</th>
                    <td class="py-4 px-4">〒000-0000<br>北海道札幌市〇〇区〇〇1-2-3</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="py-4 font-bold w-1/3 text-gray-600 bg-gray-50 px-4">お問い合わせ先</th>
                    <td class="py-4 px-4">メール：info@example.com<br>電話：090-0000-0000</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="py-4 font-bold w-1/3 text-gray-600 bg-gray-50 px-4">販売価格</th>
                    <td class="py-4 px-4">商品・講座ごとに記載</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="py-4 font-bold w-1/3 text-gray-600 bg-gray-50 px-4">お支払い方法</th>
                    <td class="py-4 px-4">クレジットカード決済、銀行振込</td>
                </tr>
                <tr class="border-b border-gray-100">
                    <th class="py-4 font-bold w-1/3 text-gray-600 bg-gray-50 px-4">キャンセル・返金</th>
                    <td class="py-4 px-4">デジタルコンテンツ・オンライン講座という性質上、お支払い後のキャンセルおよび返金は原則としてお受けできません。</td>
                </tr>
            </tbody>
        </table>
        
        <div class="mt-12 text-center">
            <a href="index.html" class="text-pink-500 font-bold hover:underline">← LPに戻る</a>
        </div>
    </div>
</body>
</html>
